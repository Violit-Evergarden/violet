    <script>
      ;(function () {
        var k = 'violet37-theme'
        var t = localStorage.getItem(k)
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
          document.documentElement.style.colorScheme = 'dark'
        }
      })()
    </script>
